# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Readability comparison — LLM assessment vs Flesch-Kincaid formula"

prompts:
  - |
    Assess the readability of the following text. 
    Return a JSON object with these fields:
    - reading_level: a US grade level number (e.g. 5, 8, 12)
    - difficulty: one of "Very Easy", "Easy", "Standard", "Fairly Difficult", "Difficult", "Very Difficult"
    - reasoning: one sentence explaining your assessment
    
    Text: {{text}}
    
    Return only raw JSON. No markdown, no code fences, no other text.

providers:
  - "anthropic:messages:claude-haiku-4-5"
  - "anthropic:messages:claude-sonnet-4-6"

tests:
  - vars:
      text: "The cat sat on the mat."
      expected_difficulty: "Very Easy"
      flesch_score: "116.15"
    assert:
      - type: javascript
        value: "JSON.parse(output.replace(/```json|```/g, '').trim()).difficulty === 'Very Easy'"
        metric: difficulty_agreement

  - vars:
      text: "Scientists found that regular exercise helps improve memory. The study followed two hundred adults over six months. Those who exercised showed better results on memory tests."
      expected_difficulty: "Difficult"
      flesch_score: "48.36"
    assert:
      - type: javascript
        value: "JSON.parse(output.replace(/```json|```/g, '').trim()).difficulty === 'Difficult'"
        metric: difficulty_agreement

  - vars:
      text: "The epistemological implications of poststrucuralist discourse necessitate a fundamental reassessment of hermeneutical frameworks."
      expected_difficulty: "Very Difficult"
      flesch_score: "-53.65"
    assert:
      - type: javascript
        value: "JSON.parse(output.replace(/```json|```/g, '').trim()).difficulty === 'Very Difficult'"
        metric: difficulty_agreement